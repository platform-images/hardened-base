name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image:
        description: "Image to build and publish"
        required: true
        type: choice
        options:
          - all
          - wolfi-base
          - nodejs-base
          - python-base
          - openjdk-base
          - nginx-base
          - go-base

permissions:
  contents: write      # create git tags + GitHub Releases
  packages: write      # push to GHCR
  id-token: write      # OIDC token for Cosign keyless signing + SLSA
  security-events: write
  attestations: write  # actions/attest-build-provenance

env:
  REGISTRY: ghcr.io
  ORG: platform-images

# ── Job 1: Detect which image directories changed (or use manual input) ───────
jobs:
  detect-changes:
    name: Detect Changed Images
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Manual trigger — build the matrix directly from the input
      - name: Set matrix from workflow_dispatch input
        if: github.event_name == 'workflow_dispatch'
        id: manual
        run: |
          IMAGE="${{ inputs.image }}"
          if [[ "$IMAGE" == "all" ]]; then
            echo 'matrix=["wolfi-base","nodejs-base","python-base","openjdk-base","nginx-base","go-base"]' >> "$GITHUB_OUTPUT"
          else
            echo "matrix=[\"${IMAGE}\"]" >> "$GITHUB_OUTPUT"
          fi

      # Push trigger — detect only what changed
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        if: github.event_name != 'workflow_dispatch'
        id: filter
        with:
          filters: |
            wolfi-base:
              - 'images/wolfi-base/**'
            nodejs-base:
              - 'images/nodejs-base/**'
            python-base:
              - 'images/python-base/**'
            openjdk-base:
              - 'images/openjdk-base/**'
            nginx-base:
              - 'images/nginx-base/**'
            go-base:
              - 'images/go-base/**'

      - name: Combine matrix output
        id: set-matrix
        env:
          MANUAL: ${{ steps.manual.outputs.matrix }}
          FILTER: ${{ steps.filter.outputs.changes }}
        run: |
          MATRIX="${MANUAL:-$FILTER}"
          if [[ -z "$MATRIX" || "$MATRIX" == "[]" ]]; then
            echo 'matrix=["__skip__"]' >> "$GITHUB_OUTPUT"
            echo 'has_changes=false' >> "$GITHUB_OUTPUT"
          else
            echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
            echo 'has_changes=true' >> "$GITHUB_OUTPUT"
          fi

# ── Job 2: Build, scan, sign, attest, and publish each changed image ──────────
  publish:
    name: Publish / ${{ matrix.image }}
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # ── Calculate next semver from git tags ─────────────────────────────────
      - name: Calculate next semver
        id: version
        run: |
          IMAGE=${{ matrix.image }}
          git fetch --tags --quiet
          LATEST=$(git tag -l "release/${IMAGE}/v*" | sort -V | tail -1)
          if [[ -z "$LATEST" ]]; then
            NEW_VER="1.0.0"
          else
            VER="${LATEST#release/${IMAGE}/v}"
            MAJOR="${VER%%.*}"; REST="${VER#*.}"; MINOR="${REST%%.*}"; PATCH="${REST#*.}"
            NEW_VER="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "semver=${NEW_VER}" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      # ── Build amd64 only first — scan before committing to a multi-arch push ─
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build standard (amd64, local) for scanning
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: images/${{ matrix.image }}
          file: images/${{ matrix.image }}/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ matrix.image }}:scan
          build-args: |
            BUILD_DATE=${{ steps.version.outputs.build_date }}
            GIT_REVISION=${{ github.sha }}

      - name: Trivy CVE scan — pre-push gate
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ matrix.image }}:scan
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true

      - name: Dockle CIS compliance report (saved as artifact)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            goodwithtech/dockle:latest \
            --exit-code 0 \
            --format json \
            ${{ matrix.image }}:scan \
          > dockle-report-${{ matrix.image }}.json

      - name: Upload Dockle report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dockle-${{ matrix.image }}-${{ steps.version.outputs.semver }}
          path: dockle-report-${{ matrix.image }}.json
          retention-days: 90

      # ── Log in and push multi-arch standard image ────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Build + push standard (multi-arch)
        id: build-standard
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: images/${{ matrix.image }}
          file: images/${{ matrix.image }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image }}:${{ steps.version.outputs.semver }}
            ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image }}:latest
          build-args: |
            BUILD_DATE=${{ steps.version.outputs.build_date }}
            GIT_REVISION=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
          provenance: false   # we generate SLSA provenance ourselves below

      # ── Distroless variant ───────────────────────────────────────────────────
      - name: Build + push distroless (multi-arch)
        id: build-distroless
        if: hashFiles(format('images/{0}/Dockerfile.distroless', matrix.image)) != ''
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: images/${{ matrix.image }}
          file: images/${{ matrix.image }}/Dockerfile.distroless
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image }}:${{ steps.version.outputs.semver }}-distroless
            ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image }}:latest-distroless
          build-args: |
            BUILD_DATE=${{ steps.version.outputs.build_date }}
            GIT_REVISION=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}-distroless
          cache-to: type=gha,scope=${{ matrix.image }}-distroless,mode=max
          provenance: false

      # ── Syft SBOM + GitHub SBOM attestation ─────────────────────────────────
      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Generate SBOM — standard
        run: |
          syft scan ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image }}@${{ steps.build-standard.outputs.digest }} \
            --output spdx-json \
            --file sbom-standard.spdx.json

      - name: Attest SBOM — standard
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image }}
          subject-digest: ${{ steps.build-standard.outputs.digest }}
          sbom-path: sbom-standard.spdx.json
          push-to-registry: true

      - name: Generate SBOM — distroless
        if: steps.build-distroless.outcome == 'success'
        run: |
          syft scan ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image }}@${{ steps.build-distroless.outputs.digest }} \
            --output spdx-json \
            --file sbom-distroless.spdx.json

      - name: Attest SBOM — distroless
        if: steps.build-distroless.outcome == 'success'
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image }}
          subject-digest: ${{ steps.build-distroless.outputs.digest }}
          sbom-path: sbom-distroless.spdx.json
          push-to-registry: true

      # ── Cosign keyless image signing (OIDC via GitHub Actions) ───────────────
      - name: Sign standard image
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image }}@${{ steps.build-standard.outputs.digest }}

      - name: Sign distroless image
        if: steps.build-distroless.outcome == 'success'
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image }}@${{ steps.build-distroless.outputs.digest }}

      # ── SLSA Level 2+ build provenance attestation ───────────────────────────
      - name: Attest build provenance — standard
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image }}
          subject-digest: ${{ steps.build-standard.outputs.digest }}
          push-to-registry: true

      - name: Attest build provenance — distroless
        if: steps.build-distroless.outcome == 'success'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image }}
          subject-digest: ${{ steps.build-distroless.outputs.digest }}
          push-to-registry: true

      # ── Git tag + GitHub Release ──────────────────────────────────────────────
      - name: Create release tag
        run: |
          TAG="release/${{ matrix.image }}/v${{ steps.version.outputs.semver }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release ${{ matrix.image }} v${{ steps.version.outputs.semver }}"
          git push origin "$TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: release/${{ matrix.image }}/v${{ steps.version.outputs.semver }}
          name: "${{ matrix.image }} v${{ steps.version.outputs.semver }}"
          body: |
            ## ${{ matrix.image }} v${{ steps.version.outputs.semver }}

            **Published:** `${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image }}:${{ steps.version.outputs.semver }}`
            **Digest (standard):** `${{ steps.build-standard.outputs.digest }}`
            **Git SHA:** `${{ github.sha }}`

            ### Verify the signature
            ```bash
            cosign verify ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image }}:${{ steps.version.outputs.semver }} \
              --certificate-identity=https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/heads/main \
              --certificate-oidc-issuer=https://token.actions.githubusercontent.com
            ```

            ### Pull
            ```dockerfile
            FROM ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image }}:${{ steps.version.outputs.semver }}@${{ steps.build-standard.outputs.digest }}
            ```
          files: |
            dockle-report-${{ matrix.image }}.json
            sbom-standard.spdx.json

      # ── Slack/Teams notification ──────────────────────────────────────────────
      - name: Notify Slack
        if: success() && env.SLACK_WEBHOOK_URL != ''
        run: |
          curl -sSf -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d '{
              "text": ":white_check_mark: *${{ matrix.image }}* v${{ steps.version.outputs.semver }} published to GHCR\nDigest: `${{ steps.build-standard.outputs.digest }}`"
            }'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
